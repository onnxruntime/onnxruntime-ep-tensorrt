name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --user -r requirements-lintrunner.txt
          lintrunner init

      - name: Run lintrunner on all files
        run: |
          set +e
          if ! lintrunner --force-color --all-files --tee-json=lint.json -v; then
              echo ""
              echo "You can reproduce locally by running:"
              echo "  pip install -r requirements-lintrunner.txt"
              echo "  lintrunner init"
              echo "  lintrunner -a  # to auto-fix"
              exit 1
          fi
