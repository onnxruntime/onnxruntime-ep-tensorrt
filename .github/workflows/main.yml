name: "Main"
description: "CI workflow to build TensorRTEp"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


env:
  PYTHON_VERSION: "3.x"
  CMAKE_CUDA_ARCHITECTURES: 80


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        config: [debug, release]

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}-${{ matrix.config }}

    steps:
    - name: Setup environment (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt install -y \
          g++-13            \
          build-essentials  \
          cmake             \
          ninja-build

    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup python environment
      run: python -m pip install tensorrt
