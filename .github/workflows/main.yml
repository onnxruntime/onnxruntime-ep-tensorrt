    - name: Upload build artifacts
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.ARTIFACT_NAME }}

  linux-build-ort:
    if: false
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug] #, RelWithDebInfo]
        cuda_version: ['12.9']  # , '13.0']

    runs-on: [
      "self-hosted",
      "1ES.Pool=onnxruntime-ep-Ubuntu2404-AMD-CPU",
      "JobId=linux-ort-build-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
    ]
    name: Linux Build ORT CUDA${{ matrix.cuda_version }} ${{ matrix.build_type }}

    container: 'ghcr.io/onnxruntime/onnxruntime-ep-tensorrt/ubuntu_2404_cuda12.9_trt10.14.1.48:sha256-463d90a20a513420863d8ba847891eaa5b23eb544dff9863667a503eee6ad850'
    environment: Linux_x64
    env:
      ALLOW_RELEASED_ONNX_OPSET_ONLY: '0'
      ARTIFACT_NAME: ort_linux_x64_cuda${{ matrix.cuda_version }}_${{ matrix.build_type }}
      AZCOPY_AUTO_LOGIN_TYPE: ${{ vars.AZCOPY_AUTO_LOGIN_TYPE }}
      AZCOPY_MSI_CLIENT_ID: ${{ vars.AZCOPY_MSI_CLIENT_ID }}
      CMAKE_CUDA_ARCHITECTURES: 86
      ONNXRUNTIME_TEST_GPU_DEVICE_ID: '0'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        repository: microsoft/onnxruntime
        ref: 'v1.24.1'
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        architecture: x64

    - name: Install python modules
      run: python -m pip install -r ./tools/ci_build/github/linux/python/requirements.txt

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-cuda${{ matrix.cuda_version }}-trt${{ matrix.trt_version }}-${{ matrix.build_type }}

    - name: Build and Clean Binaries
      run: |
        env
        # Caution with the use of github.workspace here. In containers,
        #   ${{ github.workspace }} != $GITHUB_WORKSPACE
        # Same is true for ${{ runner.temp }} and $RUNNER_TEMP
        # Reported issue -
        # https://github.com/actions/runner/issues/2058
        
        # --use_vcpkg \
        # --use_vcpkg_ms_internal_asset_cache \
        # Execute the build process
        python $GITHUB_WORKSPACE/tools/ci_build/build.py \
          --update \
          --build \
          --config ${{ matrix.build_type }} \
          --build_dir build \
          --use_cache \
          --skip_submodule_sync \
          --parallel \
          --cmake_generator "Ninja" \
          --build_shared_lib \
          --target onnxruntime_provider_test

        # Clean up the output directory before uploading artifacts
        export outputDir="build/${{ matrix.build_type }}"

        rm -rf "$outputDir/lib"
        rm -rf "$outputDir/onnxruntime"
        rm -rf "$outputDir/pybind11"
        rm -rf "$outputDir/models"
        rm -rf "$outputDir/vcpkg_installed"
        rm -rf "$outputDir/_deps"
        rm -rf "$outputDir/CMakeCache.txt"
        rm -rf "$outputDir/CMakeFiles"
        find $outputDir -type f -name '*.a' -delete
        find $outputDir -type f -name '*.obj' -delete
        find $outputDir -type f -name '*.pch' -delete
        find $outputDir -type f -name '*.tlog' -delete

        # Move the testdata folder under the output folder so
        # it gets included as part of the artifact
        mv onnxruntime/test/testdata $outputDir/.

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: build/${{ matrix.build_type }}


  linux-run-test:
    if: false
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug] # , RelWithDebInfo
        cuda_version: ['13.0'] #, '12.9'
        trt_version: ['10.14.1.48']

    runs-on: [
      "self-hosted",
      "1ES.Pool=onnxruntime-ep-Ubuntu2404-AMD-CPU",
      "JobId=linux-ort-build-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
    ]
    name: Linux Run Tests CUDA${{ matrix.cuda_version }} ${{ matrix.build_type }}

    # container: 'ghcr.io/onnxruntime/onnxruntime-ep-tensorrt/ubuntu_2404_cuda12.9_trt10.14.1.48:sha256-463d90a20a513420863d8ba847891eaa5b23eb544dff9863667a503eee6ad850'
    container: 'ghcr.io/onnxruntime/onnxruntime-ep-tensorrt/ubuntu_2404_cuda13.0_trt10.14.1.48:sha256-89dd6a87dc78bad59738659ca17a5d35c5413869fa27467601f54c99a565fc5f'
    environment: Linux_x64
    env:
      ALLOW_RELEASED_ONNX_OPSET_ONLY: '0'
      AZCOPY_AUTO_LOGIN_TYPE: ${{ vars.AZCOPY_AUTO_LOGIN_TYPE }}
      AZCOPY_MSI_CLIENT_ID: ${{ vars.AZCOPY_MSI_CLIENT_ID }}
      CMAKE_CUDA_ARCHITECTURES: 86
      ONNXRUNTIME_TEST_GPU_DEVICE_ID: '0'

    steps:
    - name: Download TRT Ep
      uses: actions/download-artifact@v7
      with:
        name: Linux_x64_cuda${{ matrix.cuda_version }}_trt${{ matrix.trt_version }}_${{ matrix.build_type }}
        run-id: '23628836210'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: orttrtep

    - name: Download ORT
      uses: actions/download-artifact@v7
      with:
        name: 'ort_linux_x64_cuda${{ matrix.cuda_version }}_${{ matrix.build_type }}'
        run-id: '23628836210'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: onnxruntime

    - name: List workspace files
      run: |
        env
        ls -lR "$GITHUB_WORKSPACE"
        echo "TRTEP_LIBRARY_PATH=$GITHUB_WORKSPACE/orttrtep/lib/libORTTensorRTEp.so" >> $GITHUB_ENV

    - name: Setup msys2
      uses: msys2/setup-msys2@v2
      id: setup-msys2

    - name: Run tests
      env:
        ORT_UNIT_TEST_MAIN_DYNAMIC_PLUGIN_EP_CONFIG_JSON: |
          {
            "ep_library_registration_name": "NvTensorRtRtx",
            "ep_library_path": ${{ toJson(env.TRTEP_LIBRARY_PATH) }},
            "selected_ep_name": "NvTensorRtRtx",
            "default_ep_options": {}
          }
      run: |
        env
        chmod +x $GITHUB_WORKSPACE/onnxruntime/onnxruntime_provider_test
        $GITHUB_WORKSPACE/onnxruntime/onnxruntime_provider_test

    - name: Setup tmate session
      if: ${{ failure() }}
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 60
      with:
        sudo: false
        msys2-location: ${{ steps.setup-msys2.outputs.msys2-location }}
