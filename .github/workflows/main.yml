name: "Build ORT"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  workflow_dispatch:


jobs:
  win-build-ort:
    if: false
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug] #, RelWithDebInfo]
        cuda_version: ['12.9']  # , '13.0']

    runs-on: [
      "self-hosted",
      "1ES.Pool=onnxruntime-ep-github-Win",
      "JobId=windows-ort-build-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
    ]
    name: Win Build ORT CUDA${{ matrix.cuda_version }} ${{ matrix.build_type }}

    environment: Windows_x64
    env:
      ALLOW_RELEASED_ONNX_OPSET_ONLY: '0'
      ARTIFACT_NAME: ort_win-x64_cuda${{ matrix.cuda_version }}_${{ matrix.build_type }}
      AZCOPY_AUTO_LOGIN_TYPE: ${{ vars.AZCOPY_AUTO_LOGIN_TYPE }}
      AZCOPY_MSI_CLIENT_ID: ${{ vars.AZCOPY_MSI_CLIENT_ID }}
      CMAKE_CUDA_ARCHITECTURES: 86
      DocUpdateNeeded: false
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      ONNXRUNTIME_TEST_GPU_DEVICE_ID: '0'
      OrtPackageId: Microsoft.ML.OnnxRuntime.Gpu
      setVcvars: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        repository: microsoft/onnxruntime
        ref: 'v1.24.1'
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Run sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Install Ninja
      shell: cmd
      run: |
        where choco
        C:\ProgramData\chocolatey\bin\choco sources
        C:\ProgramData\chocolatey\bin\choco source add -n chocolatey -s 'https://chocolatey.org/api/v2/'
        C:\ProgramData\chocolatey\bin\choco install ninja

    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        architecture: x64

    - name: Install python modules
      shell: cmd
      run: python -m pip install -r .\tools\ci_build\github\windows\python\requirements.txt

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'

    - name: Setup Nuget
      uses: nuget/setup-nuget@v2
      with:
        nuget-version: '6.x'

    - name: NuGet restore
      shell: cmd
      run: |
        nuget restore ${{ github.workspace }}\packages.config ^
          -ConfigFile ${{ github.workspace }}\NuGet.config ^
          -PackagesDirectory ${{ runner.temp }}\build\${{ matrix.build_type }}

    - name: Set OnnxRuntimeBuildDirectory
      shell: pwsh
      run: |
        $buildDir = Join-Path ${{ runner.temp }} "build"
        echo "OnnxRuntimeBuildDirectory=$buildDir" >> ${env:GITHUB_ENV}

    - name: Locate vcvarsall and Setup Env
      uses: ./.github/actions/locate-vcvarsall-and-setup-env
      with:
        architecture: x64

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Build and Clean Binaries
      working-directory: ${{ runner.temp }}
      shell: pwsh
      env:
        SCCACHE_GHA_ENABLED: "true"
      run: |
        npm install -g typescript
        if ($lastExitCode -ne 0) {
          exit $lastExitCode
        }

        # Execute the build process
        python.exe ${{ github.workspace }}\tools\ci_build\build.py `
          --update `
          --build `
          --config ${{ matrix.build_type }} `
          --build_dir build `
          --skip_submodule_sync `
          --parallel `
          --cmake_generator "Ninja" `
          --build_shared_lib `
          --use_vcpkg `
          --use_vcpkg_ms_internal_asset_cache `
          --target onnxruntime_provider_test
        if ($lastExitCode -ne 0) {
          exit $lastExitCode
        }

        # Clean up the output directory before uploading artifacts
        $outputDir = "${{ runner.temp }}\build\${{ matrix.build_type }}"
        Write-Host "Cleaning up files from $outputDir..."

        Remove-Item -Path "$outputDir\onnxruntime" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$outputDir\pybind11" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$outputDir\models" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$outputDir\vcpkg_installed" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$outputDir\_deps" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$outputDir\CMakeCache.txt" -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "$outputDir\CMakeFiles" -Recurse -Force -ErrorAction SilentlyContinue
        # Remove intermediate object files as in the original script
        Remove-Item -Path $outputDir -Include "*.obj" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path $outputDir -Include "*.pch" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path $outputDir -Include "*.tlog" -Recurse -Force -ErrorAction SilentlyContinue

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ runner.temp }}\build\${{ matrix.build_type }}


  win-run-test:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug] # , RelWithDebInfo
        cuda_version: ['12.9'] # '13.0'
        trt_version: ['10.14.1.48']

    runs-on: [
      "self-hosted",
      "1ES.Pool=onnxruntime-ep-github-Win-GPU-A10",
      "JobId=windows-ort-build-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
    ]
    name: Win Run Tests CUDA${{ matrix.cuda_version }} ${{ matrix.build_type }}

    environment: Windows_x64
    env:
      ALLOW_RELEASED_ONNX_OPSET_ONLY: '0'
      AZCOPY_AUTO_LOGIN_TYPE: ${{ vars.AZCOPY_AUTO_LOGIN_TYPE }}
      AZCOPY_MSI_CLIENT_ID: ${{ vars.AZCOPY_MSI_CLIENT_ID }}
      CMAKE_CUDA_ARCHITECTURES: 86
      ONNXRUNTIME_TEST_GPU_DEVICE_ID: '0'
      TRTEP_LIBRARY_PATH: '${{ github.workspace }}\orttrtep\bin\ORTTensorRTEp.dll'
      ARTIFACT_NAME: onnxruntime_provider_test.exe.${{ matrix.build_type }}.results.xml

      BUILD_TYPE: ${{ matrix.build_type }}
      CUDA_VERSION: ${{ matrix.cuda_version }}
      TRT_VERSION: ${{ matrix.trt_version }}

    steps:
    # - name: Setup .Net
    #   uses: actions/setup-dotnet@v5
    #   env:
    #     PROCESSOR_ARCHITECTURE: x64
    #   with:
    #     dotnet-version: '10.x'

    - name: Install WinDbg
      shell: pwsh
      if: false
      run: |
        $OutDir = "."
        $Arch = "x64"

        if (!(Test-Path $OutDir)) {
            $null = mkdir $OutDir
        }

        # Download the appinstaller to find the current uri for the msixbundle
        Invoke-WebRequest https://aka.ms/windbg/download -OutFile $OutDir\windbg.appinstaller

        # Download the msixbundle
        $msixBundleUri = ([xml](Get-Content $OutDir\windbg.appinstaller)).AppInstaller.MainBundle.Uri

        if ($PSVersionTable.PSVersion.Major -lt 6) {
            # This is a workaround to get better performance on older versions of PowerShell
            $ProgressPreference = 'SilentlyContinue'
        }

        # Download the msixbundle (but name as zip for older versions of Expand-Archive
        Invoke-WebRequest $msixBundleUri -OutFile $OutDir\windbg.zip

        # Extract the 3 msix files (plus other files)
        Expand-Archive -DestinationPath $OutDir\UnzippedBundle $OutDir\windbg.zip

        # Rename msix (for older versions of Expand-Archive) and extract the debugger
        Move-Item "$OutDir\UnzippedBundle\windbg_win-$Arch.msix" "$OutDir\UnzippedBundle\windbg_win-$Arch.zip"
        Expand-Archive -Path "$OutDir\UnzippedBundle\windbg_win-$Arch.zip" -DestinationPath "$OutDir\windbg"

        # Now you can run:
        # & $OutDir\windbg\DbgX.Shell.exe

        & $OutDir\windbg\amd64\cdb.exe -iaec "-c `".dump /u /ma ${{ github.workspace }}\;q`""
        Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\AeDebug' -Name 'auto' -Value '1'

    - name: Setup msys2
      uses: msys2/setup-msys2@v2
      id: setup-msys2

    - name: Download CUDA SDK v${{ matrix.cuda_version }}
      shell: pwsh
      run: |
        azcopy.exe cp --recursive "https://lotusscus.blob.core.windows.net/models/cuda_sdk/v${env:CUDA_VERSION}" "${env:RUNNER_TEMP}"
        Get-ChildItem -Path "${env:RUNNER_TEMP}"
        Get-ChildItem -Path "${env:RUNNER_TEMP}\v${env:CUDA_VERSION}" -Recurse
        Add-Content -Path ${env:GITHUB_PATH} -Value "${env:RUNNER_TEMP}\v${env:CUDA_VERSION}\bin\x64"
        Add-Content -Path ${env:GITHUB_PATH} -Value "${env:RUNNER_TEMP}\v${env:CUDA_VERSION}\bin"
        Add-Content -Path ${env:GITHUB_PATH} -Value "${env:RUNNER_TEMP}\v${env:CUDA_VERSION}\extras\CUPTI\lib64"

    - name: Download TensorRT-${{ matrix.trt_version }}.Windows.win10.cuda-${{ matrix.cuda_version }}
      shell: pwsh
      run: |
        azcopy.exe cp --recursive "https://lotusscus.blob.core.windows.net/models/local/TensorRT-${env:TRT_VERSION}.Windows.win10.cuda-${env:CUDA_VERSION}" "${env:RUNNER_TEMP}"
        Get-ChildItem -Path "${env:RUNNER_TEMP}"
        Get-ChildItem -Path "${env:RUNNER_TEMP}\TensorRT-${env:TRT_VERSION}.Windows.win10.cuda-${env:CUDA_VERSION}" -Recurse
        Add-Content -Path ${env:GITHUB_PATH} -Value "${env:RUNNER_TEMP}\TensorRT-${env:TRT_VERSION}.Windows.win10.cuda-${env:CUDA_VERSION}\bin"
        Add-Content -Path ${env:GITHUB_PATH} -Value "${env:RUNNER_TEMP}\TensorRT-${env:TRT_VERSION}.Windows.win10.cuda-${env:CUDA_VERSION}\lib"

    - name: Download TRT Ep
      uses: actions/download-artifact@v7
      with:
        name: Windows_x64_cuda${{ matrix.cuda_version }}_trt${{ matrix.trt_version }}_${{ matrix.build_type }}
        run-id: '23867236605'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: orttrtep

    - name: Download ORT
      uses: actions/download-artifact@v7
      with:
        name: 'ort_win-x64_cuda${{ matrix.cuda_version }}_${{ matrix.build_type }}'
        run-id: '23867236605'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: onnxruntime

    # - name: List workspace files
    #   run: |
    #     Get-ChildItem Env: | Format-Table -AutoSize
    #     $env:Path -split ';'
    #     Get-ChildItem -Path "${{ github.workspace }}"
    #     Get-ChildItem -Path "${{ github.workspace }}/onnxruntime" -Recurse
    #     Get-ChildItem -Path "${{ github.workspace }}/orttrtep" -Recurse
    #     Get-ChildItem -Path "${{ runner.temp }}"

    # - name: Download WinDepends
    #   uses: robinraju/release-downloader@v1
    #   with:
    #     repository: hfiref0x/WinDepends
    #     fileName: 'WinDepends_v1.0.0.2512_beta_snapshot.zip'
    #     tag: '2512-beta'
    #     extract: true
    # WinDepends.exe ${{ env.TRTEP_LIBRARY_PATH }} -o ORTTensorRTEp.json
    # WinDepends.exe ${{ github.workspace }}\onnxruntime\onnxruntime_provider_test.exe -o onnxruntime_provider_test.json

    - name: Run tests
      env:
        ORT_UNIT_TEST_MAIN_LOG_LEVEL: 0
        ORT_UNIT_TEST_MAIN_DYNAMIC_PLUGIN_EP_CONFIG_JSON: |
          {
            "ep_library_registration_name": "NvTensorRtRtx",
            "ep_library_path": ${{ toJson(env.TRTEP_LIBRARY_PATH) }},
            "selected_ep_name": "NvTensorRtRtx",
            "default_ep_options": {}
          }
      run: |
        Get-ChildItem Env: | Format-Table -AutoSize
        $env:Path -split ';'
        "${env:GITHUB_WORKSPACE}\onnxruntime\onnxruntime_provider_test.exe" --gtest_output=xml:"${env:ARTIFACT_NAME}"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.ARTIFACT_NAME }}

    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      if: false
      timeout-minutes: 60
      with:
        sudo: false
        msys2-location: ${{ steps.setup-msys2.outputs.msys2-location }}

    # - name: Upload build artifacts
    #   if: success() || failure()
    #   uses: actions/upload-artifact@v7
    #   with:
    #     name: depends
    #     path: |
    #       ORTTensorRTEp.json
    #       onnxruntime_provider_test.json

  linux-build-ort:
    if: false
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug] #, RelWithDebInfo]
        cuda_version: ['12.9']  # , '13.0']

    runs-on: [
      "self-hosted",
      "1ES.Pool=onnxruntime-ep-Ubuntu2404-AMD-CPU",
      "JobId=linux-ort-build-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
    ]
    name: Linux Build ORT CUDA${{ matrix.cuda_version }} ${{ matrix.build_type }}

    container: 'ghcr.io/onnxruntime/onnxruntime-ep-tensorrt/ubuntu_2404_cuda12.9_trt10.14.1.48:sha256-463d90a20a513420863d8ba847891eaa5b23eb544dff9863667a503eee6ad850'
    environment: Linux_x64
    env:
      ALLOW_RELEASED_ONNX_OPSET_ONLY: '0'
      ARTIFACT_NAME: ort_linux_x64_cuda${{ matrix.cuda_version }}_${{ matrix.build_type }}
      AZCOPY_AUTO_LOGIN_TYPE: ${{ vars.AZCOPY_AUTO_LOGIN_TYPE }}
      AZCOPY_MSI_CLIENT_ID: ${{ vars.AZCOPY_MSI_CLIENT_ID }}
      CMAKE_CUDA_ARCHITECTURES: 86
      ONNXRUNTIME_TEST_GPU_DEVICE_ID: '0'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        repository: microsoft/onnxruntime
        ref: 'v1.24.1'
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        architecture: x64

    - name: Install python modules
      run: python -m pip install -r ./tools/ci_build/github/linux/python/requirements.txt

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-cuda${{ matrix.cuda_version }}-trt${{ matrix.trt_version }}-${{ matrix.build_type }}

    - name: Build and Clean Binaries
      run: |
        env
        # Caution with the use of github.workspace here. In containers,
        #   ${{ github.workspace }} != $GITHUB_WORKSPACE
        # Same is true for ${{ runner.temp }} and $RUNNER_TEMP
        # Reported issue -
        # https://github.com/actions/runner/issues/2058
        
        # --use_vcpkg \
        # --use_vcpkg_ms_internal_asset_cache \
        # Execute the build process
        python $GITHUB_WORKSPACE/tools/ci_build/build.py \
          --update \
          --build \
          --config ${{ matrix.build_type }} \
          --build_dir build \
          --use_cache \
          --skip_submodule_sync \
          --parallel \
          --cmake_generator "Ninja" \
          --build_shared_lib \
          --target onnxruntime_provider_test

        # Clean up the output directory before uploading artifacts
        export outputDir="build/${{ matrix.build_type }}"

        rm -rf "$outputDir/lib"
        rm -rf "$outputDir/onnxruntime"
        rm -rf "$outputDir/pybind11"
        rm -rf "$outputDir/models"
        rm -rf "$outputDir/vcpkg_installed"
        rm -rf "$outputDir/_deps"
        rm -rf "$outputDir/CMakeCache.txt"
        rm -rf "$outputDir/CMakeFiles"
        find $outputDir -type f -name '*.a' -delete
        find $outputDir -type f -name '*.obj' -delete
        find $outputDir -type f -name '*.pch' -delete
        find $outputDir -type f -name '*.tlog' -delete

        # Move the testdata folder under the output folder so
        # it gets included as part of the artifact
        mv onnxruntime/test/testdata $outputDir/.

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: build/${{ matrix.build_type }}


  linux-run-test:
    if: false
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug] # , RelWithDebInfo
        cuda_version: ['13.0'] #, '12.9'
        trt_version: ['10.14.1.48']

    runs-on: [
      "self-hosted",
      "1ES.Pool=onnxruntime-ep-Ubuntu2404-AMD-CPU",
      "JobId=linux-ort-build-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
    ]
    name: Linux Run Tests CUDA${{ matrix.cuda_version }} ${{ matrix.build_type }}

    # container: 'ghcr.io/onnxruntime/onnxruntime-ep-tensorrt/ubuntu_2404_cuda12.9_trt10.14.1.48:sha256-463d90a20a513420863d8ba847891eaa5b23eb544dff9863667a503eee6ad850'
    container: 'ghcr.io/onnxruntime/onnxruntime-ep-tensorrt/ubuntu_2404_cuda13.0_trt10.14.1.48:sha256-89dd6a87dc78bad59738659ca17a5d35c5413869fa27467601f54c99a565fc5f'
    environment: Linux_x64
    env:
      ALLOW_RELEASED_ONNX_OPSET_ONLY: '0'
      AZCOPY_AUTO_LOGIN_TYPE: ${{ vars.AZCOPY_AUTO_LOGIN_TYPE }}
      AZCOPY_MSI_CLIENT_ID: ${{ vars.AZCOPY_MSI_CLIENT_ID }}
      CMAKE_CUDA_ARCHITECTURES: 86
      ONNXRUNTIME_TEST_GPU_DEVICE_ID: '0'

    steps:
    - name: Download TRT Ep
      uses: actions/download-artifact@v7
      with:
        name: Linux_x64_cuda${{ matrix.cuda_version }}_trt${{ matrix.trt_version }}_${{ matrix.build_type }}
        run-id: '23628836210'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: orttrtep

    - name: Download ORT
      uses: actions/download-artifact@v7
      with:
        name: 'ort_linux_x64_cuda${{ matrix.cuda_version }}_${{ matrix.build_type }}'
        run-id: '23628836210'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: onnxruntime

    - name: List workspace files
      run: |
        env
        ls -lR "$GITHUB_WORKSPACE"
        echo "TRTEP_LIBRARY_PATH=$GITHUB_WORKSPACE/orttrtep/lib/libORTTensorRTEp.so" >> $GITHUB_ENV

    - name: Setup msys2
      uses: msys2/setup-msys2@v2
      id: setup-msys2

    - name: Run tests
      env:
        ORT_UNIT_TEST_MAIN_DYNAMIC_PLUGIN_EP_CONFIG_JSON: |
          {
            "ep_library_registration_name": "NvTensorRtRtx",
            "ep_library_path": ${{ toJson(env.TRTEP_LIBRARY_PATH) }},
            "selected_ep_name": "NvTensorRtRtx",
            "default_ep_options": {}
          }
      run: |
        env
        chmod +x $GITHUB_WORKSPACE/onnxruntime/onnxruntime_provider_test
        $GITHUB_WORKSPACE/onnxruntime/onnxruntime_provider_test

    - name: Setup tmate session
      if: ${{ failure() }}
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 60
      with:
        sudo: false
        msys2-location: ${{ steps.setup-msys2.outputs.msys2-location }}
