name: "Main"
description: "CI workflow to build TensorRTEp"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


env:
  PYTHON_VERSION: "3.x"
  CMAKE_CUDA_ARCHITECTURES: 86


jobs:
  win-build:
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, RelWithDebInfo]

    runs-on: [
      "self-hosted",
      "1ES.Pool=onnxruntime-ep-github-Win",
      "JobId=windows-tensorrtep-build-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
    ]
    name: Windows-${{ matrix.config }}

    environment: Windows_x64
    env:
      AZCOPY_AUTO_LOGIN_TYPE: ${{ vars.AZCOPY_AUTO_LOGIN_TYPE }}
      AZCOPY_MSI_CLIENT_ID: ${{ vars.AZCOPY_MSI_CLIENT_ID }}
      ARTIFACT_NAME: Windows_x64_${{ matrix.config }}

    steps:
    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    # - name: Setup python environment
    #   run: python -m pip install tensorrt

    - name: Install Ninja
      shell: cmd
      run: |
        where choco
        C:\ProgramData\chocolatey\bin\choco sources
        C:\ProgramData\chocolatey\bin\choco source add -n chocolatey -s 'https://chocolatey.org/api/v2/'
        C:\ProgramData\chocolatey\bin\choco install ninja

    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Download CUDA SDK v12.8
      shell: pwsh
      run: |
        azcopy.exe cp --recursive "https://lotusscus.blob.core.windows.net/models/cuda_sdk/v12.8" ${{ runner.temp }}
        Get-ChildItem -Path "${{ runner.temp }}"
        Get-ChildItem -Path "${{ runner.temp }}\v12.8" -Recurse

    - name: Download TensorRT-10.14.1.48.Windows.win10.cuda-12.9
      shell: pwsh
      run: |
        azcopy.exe cp --recursive "https://lotusscus.blob.core.windows.net/models/local/TensorRT-10.14.1.48.Windows.win10.cuda-12.9" ${{ runner.temp }}
        Get-ChildItem -Path "${{ runner.temp }}"
        Get-ChildItem -Path "${{ runner.temp }}\TensorRT-10.14.1.48.Windows.win10.cuda-12.9" -Recurse

    - name: Build
      shell: cmd
      env:
        CC: cl
        CXX: cl
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        if %errorlevel% neq 0 exit /b %errorlevel%

        set
        where cmake && cmake --version
        where ninja && ninja --version
        where %CC% && %CC%
        where %CXX% && %CXX%
        where python && python --version

        cmake ^
          -G Ninja ^
          -DCMAKE_BUILD_TYPE=${{ matrix.config }} ^
          -DCMAKE_INSTALL_PREFIX=out/${{ env.ARTIFACT_NAME }} ^
          -DCMAKE_CUDA_COMPILER=${{ runner.temp }}\v12.8\bin\nvcc.exe ^
          -DCMAKE_CUDA_ARCHITECTURES=${{ env.CMAKE_CUDA_ARCHITECTURES }} ^
          -DTENSORRT_HOME=${{ runner.temp }}\TensorRT-10.14.1.48.Windows.win10.cuda-12.9 ^
          -S . -B out/build
        if %errorlevel% neq 0 exit /b %errorlevel%

        cmake --build out/build -j %NUMBER_OF_PROCESSORS%
        if %errorlevel% neq 0 exit /b %errorlevel%
        cmake --install out/build

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: out/${{ env.ARTIFACT_NAME }}

  linux-build:
    strategy:
      fail-fast: false
      matrix:
        config: [Debug] # RelWithDebInfo

    runs-on: [
      "self-hosted",
      "1ES.Pool=onnxruntime-ep-Ubuntu2404-AMD-CPU",
      "JobId=linux-tensorrtep-build-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}"
    ]
    name: Linux-${{ matrix.config }}

    environment: Linux_x64
    env:
      AZCOPY_AUTO_LOGIN_TYPE: ${{ vars.AZCOPY_AUTO_LOGIN_TYPE }}
      AZCOPY_MSI_CLIENT_ID: ${{ vars.AZCOPY_MSI_CLIENT_ID }}
      ARTIFACT_NAME: Linux_x64_${{ matrix.config }}

    steps:
    - name: Setup environment
      run: |
        sudo apt install -y \
          g++-13            \
          build-essential   \
          cmake             \
          ninja-build

    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    # - name: Setup python environment
    #   run: python -m pip install tensorrt

    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Download CUDA SDK v12.8
      run: |
        azcopy cp --recursive "https://lotusscus.blob.core.windows.net/models/cuda_sdk/v12.8" ${{ runner.temp }}
        ls -l "${{ runner.temp }}"
        ls -lR "${{ runner.temp }}/v12.8"

    - name: Download TensorRT-10.14.1.48.Windows.win10.cuda-12.9
      run: |
        azcopy cp --recursive "https://lotusscus.blob.core.windows.net/models/local/TensorRT-10.14.1.48.Windows.win10.cuda-12.9" ${{ runner.temp }}
        ls -l "${{ runner.temp }}"
        ls -lR "${{ runner.temp }}/TensorRT-10.14.1.48.Windows.win10.cuda-12.9"

    - name: Build on Linux
      env:
        CC: gcc-13
        CXX: g++-13
      run: |
        env
        which cmake && cmake --version
        which ninja && ninja --version
        which $CC && $CC --version
        which $CXX && $CXX --version
        which python && python --version

        cmake                                                                             \
          -G Ninja                                                                        \
          -DCMAKE_BUILD_TYPE=${{ matrix.config}}                                          \
          -DCMAKE_INSTALL_PREFIX=out/${{ env.ARTIFACT_NAME }}                             \
          -DCMAKE_CUDA_COMPILER=${{ runner.temp }}/v12.8/bin/nvcc.exe                     \
          -DCMAKE_CUDA_ARCHITECTURES=${{ env.CMAKE_CUDA_ARCHITECTURES }}                  \
          -DTENSORRT_HOME=${{ runner.temp }}/TensorRT-10.14.1.48.Windows.win10.cuda-12.9  \
          -S . -B out/build
        cmake --build out/build -j `nproc`
        cmake --install out/build

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: out/${{ env.ARTIFACT_NAME }}
